name: Bootstrap TimeFit source

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "timefit-bootstrap"
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract TimeFit source
        run: |
          test -f timefit-source.zip
          mkdir -p "$RUNNER_TEMP/timefit-source"
          unzip -q timefit-source.zip -d "$RUNNER_TEMP/timefit-source"
          rsync -a --delete --exclude='.git/' "$RUNNER_TEMP/timefit-source/" ./
          rm -f timefit-source.zip
          rm -f .github/workflows/bootstrap-timefit.yml

      - name: Commit extracted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy TimeFit prototype source" || true
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
