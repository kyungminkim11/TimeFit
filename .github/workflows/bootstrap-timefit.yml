name: Bootstrap TimeFit source

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Extract TimeFit source
        run: |
          test -f timefit-source.zip
          mkdir -p "$RUNNER_TEMP/timefit-source"
          unzip -q timefit-source.zip -d "$RUNNER_TEMP/timefit-source"
          rsync -a --delete --exclude='.git/' "$RUNNER_TEMP/timefit-source/" ./
          rm -f timefit-source.zip
          rm -f .github/workflows/bootstrap-timefit.yml

      - name: Commit extracted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy TimeFit prototype source" || true
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
