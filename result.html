<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>추천 결과 | TimeFit</title><link rel="stylesheet" href="css/v2.css"><script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9dd3396dc9afd1f1fe1b0cc2bbc42096&libraries=services"></script></head><body><header class="site-header"><nav class="container nav"><a class="brand" href="index.html"><span class="brand-mark">T</span>TimeFit</a><div class="nav-links"><a class="button button-primary button-small keep-mobile" id="respond" href="#">내 응답 입력</a></div></nav></header><main><section class="page-hero"><div class="container" id="result-head"><div class="loading">추천 결과를 계산하는 중입니다.</div></div></section><section class="container stack hidden" id="result-body" style="padding-bottom:72px"><section class="panel"><div class="section-heading"><span class="eyebrow">Best time</span><h2>가장 많이 겹치는 시간</h2><p>각 참여자가 입력한 시간 범위의 실제 교집합을 계산했습니다.</p></div><div class="result-grid" id="times"></div></section><section class="panel"><div class="section-heading"><span class="eyebrow">Balanced place</span><h2>이동 균형이 좋은 만남 지점</h2><p>모든 출발 위치까지의 평균 거리와 가장 먼 사람의 거리를 함께 비교합니다.</p></div><div class="result-grid"><div><div id="place-summary"></div><div class="distance-table" id="distances"></div></div><div class="map-shell"><div class="map" id="result-map"></div></div></div></section><section class="panel"><h3>참여자별 응답</h3><div class="stack" id="details" style="margin-top:16px"></div></section><section class="panel"><h3>결과 공유</h3><p class="panel-intro">새 응답이 들어오면 이 페이지의 결과도 자동으로 달라집니다.</p><div class="share-box"><input class="input" id="share-url" readonly><button class="button button-secondary" id="copy-result">링크 복사</button></div></section></section></main><footer class="footer"><div class="container footer-inner"><div>© 2026 Lava Labs · TimeFit</div><div class="footer-links"><a href="privacy.html">개인정보처리방침</a><a href="terms.html">이용약관</a></div></div></footer><div class="toast" id="toast"></div><script>
const $=s=>document.querySelector(s),code=new URLSearchParams(location.search).get('code')||'',api='https://jnciddblcndmthmmvqrz.functions.supabase.co/timefit-public';$('#respond').href='event.html?code='+encodeURIComponent(code);$('#share-url').value=location.href;$('#copy-result').onclick=async()=>{await navigator.clipboard.writeText(location.href);$('#toast').textContent='결과 링크를 복사했습니다.';$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1800)};function el(t,v,c=''){const n=document.createElement(t);n.textContent=v;if(c)n.className=c;return n}function min(t){const[a,b]=t.split(':').map(Number);return a*60+b}function clock(n){return String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0')}function day(d){return new Intl.DateTimeFormat('ko-KR',{month:'long',day:'numeric',weekday:'short'}).format(new Date(d+'T00:00:00'))}function overlaps(people){const dates=[...new Set(people.flatMap(p=>(p.availability||[]).map(x=>x.date)))],out=[];dates.forEach(date=>{const cuts=[...new Set(people.flatMap(p=>(p.availability||[]).filter(x=>x.date===date).flatMap(x=>[min(x.start),min(x.end)])))].sort((a,b)=>a-b);for(let i=0;i<cuts.length-1;i++){const a=cuts[i],b=cuts[i+1];if(b<=a)continue;const names=people.filter(p=>(p.availability||[]).some(x=>x.date===date&&min(x.start)<=a&&min(x.end)>=b)).map(p=>p.display_name).sort();if(!names.length)continue;const prev=out.at(-1);if(prev&&prev.date===date&&prev.end===a&&prev.names.join('|')===names.join('|'))prev.end=b;else out.push({date,start:a,end:b,names})}});return out.sort((a,b)=>b.names.length-a.names.length||(b.end-b.start)-(a.end-a.start)||a.date.localeCompare(b.date)||a.start-b.start)}function hav(a,b){const r=6371,rad=x=>x*Math.PI/180,d1=rad(b.lat-a.lat),d2=rad(b.lng-a.lng),q=Math.sin(d1/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(d2/2)**2;return 2*r*Math.asin(Math.sqrt(q))}function median(points){let x=points.reduce((s,p)=>s+p.lat,0)/points.length,y=points.reduce((s,p)=>s+p.lng,0)/points.length;for(let k=0;k<30;k++){let nx=0,ny=0,w=0;for(const p of points){const d=Math.max(hav({lat:x,lng:y},p),.001),v=1/d;nx+=p.lat*v;ny+=p.lng*v;w+=v}const a=nx/w,b=ny/w;if(Math.abs(a-x)+Math.abs(b-y)<.000001)break;x=a;y=b}return{lat:x,lng:y}}function renderTimes(people){const box=$('#times'),list=overlaps(people).slice(0,6);box.innerHTML='';if(!list.length){box.append(el('div','아직 비교할 수 있는 시간 응답이 없습니다.','empty-state'));return}list.forEach((x,i)=>{const card=el('article','',`result-card${i===0?' featured':''}`),rank=el('div',i===0?'BEST':'OPTION '+(i+1),'result-rank'),time=el('div',`${day(x.date)} · ${clock(x.start)}–${clock(x.end)}`,'result-time'),peopleText=el('div',`${x.names.length}명 가능 · ${x.names.join(', ')}`,'result-people'),bar=el('div','', 'progress'),fill=el('span');fill.style.width=(x.names.length/people.length*100)+'%';bar.append(fill);card.append(rank,time,bar,peopleText);box.append(card)})}function renderDetails(people){const box=$('#details');box.innerHTML='';if(!people.length)return box.append(el('div','아직 응답이 없습니다.','empty-state'));people.forEach(p=>{const card=el('article','', 'result-card'),name=el('strong',p.display_name),where=el('div',p.address||'위치 미입력','result-people');card.append(name,where);(p.availability||[]).forEach(x=>card.append(el('div',`${day(x.date)} ${x.start}–${x.end}`,'distance-row')));box.append(card)})}function renderMap(people){const pts=people.filter(p=>Number.isFinite(p.latitude)&&Number.isFinite(p.longitude)).map(p=>({lat:p.latitude,lng:p.longitude,name:p.display_name,address:p.address})),summary=$('#place-summary');if(!pts.length||!window.kakao){summary.append(el('div','위치 응답이 아직 없습니다.','empty-state'));return}const center=median(pts),map=new kakao.maps.Map($('#result-map'),{center:new kakao.maps.LatLng(center.lat,center.lng),level:8}),bounds=new kakao.maps.LatLngBounds(),places=new kakao.maps.services.Places();pts.forEach(p=>{const pos=new kakao.maps.LatLng(p.lat,p.lng);new kakao.maps.Marker({map,position:pos,title:p.name});bounds.extend(pos)});function choose(candidates){const all=candidates.length?candidates:[{place_name:'계산된 균형 지점',y:center.lat,x:center.lng,address_name:'출발 위치의 기하 중앙값'}];const ranked=all.map(x=>{const point={lat:+x.y,lng:+x.x},ds=pts.map(p=>hav(point,p));return{x,point,ds,score:Math.max(...ds)*.7+(ds.reduce((a,b)=>a+b,0)/ds.length)*.3}}).sort((a,b)=>a.score-b.score),best=ranked[0],pos=new kakao.maps.LatLng(best.point.lat,best.point.lng);new kakao.maps.Marker({map,position:pos,title:best.x.place_name});bounds.extend(pos);map.setBounds(bounds);summary.append(el('div',best.x.place_name,'place-name'),el('p',best.x.road_address_name||best.x.address_name||'균형 지점','result-people'));const table=$('#distances');best.ds.forEach((d,i)=>{const row=el('div','', 'distance-row');row.append(el('span',pts[i].name),el('strong',d.toFixed(1)+'km'));table.append(row)})}places.categorySearch('SW8',(r,s)=>choose(s===kakao.maps.services.Status.OK?r:[]),{location:new kakao.maps.LatLng(center.lat,center.lng),radius:10000,sort:kakao.maps.services.SortBy.DISTANCE})}fetch(api+'?action=event&code='+encodeURIComponent(code)).then(r=>r.json().then(d=>[r.ok,d])).then(([ok,d])=>{if(!ok||!d.event)throw 0;const e=d.event,p=d.participants||[],h=$('#result-head');h.replaceChildren(el('span','Live result','eyebrow'),el('h1',e.title),el('p',`${p.length}명의 최신 응답으로 계산한 결과입니다.`));renderTimes(p);renderDetails(p);renderMap(p);$('#result-body').classList.remove('hidden')}).catch(()=>$('#result-head').textContent='결과를 불러올 수 없습니다.');
</script></body></html>
