<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>모임 참여 | TimeFit</title><link rel="stylesheet" href="css/v2.css"><script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9dd3396dc9afd1f1fe1b0cc2bbc42096&libraries=services"></script></head><body><header class="site-header"><nav class="container nav"><a class="brand" href="index.html"><span class="brand-mark">T</span>TimeFit</a><div class="nav-links"><a class="button button-primary button-small keep-mobile" href="index.html#create">새 모임</a></div></nav></header><main><section class="page-hero"><div class="container" id="event-head"><div class="loading">모임 정보를 불러오는 중입니다.</div></div></section><section class="container layout hidden" id="event-body"><form class="panel stack" id="response-form" action="https://jnciddblcndmthmmvqrz.functions.supabase.co/timefit-public" method="post"><input type="hidden" name="action" value="respond"><input type="hidden" name="code" id="code"><input type="hidden" name="availability" id="availability"><input type="hidden" name="latitude" id="latitude"><input type="hidden" name="longitude" id="longitude"><input type="hidden" name="address" id="address"><div><span class="eyebrow">Your response</span><h2>가능한 시간과 출발지를 입력하세요.</h2><p class="panel-intro">시간대는 여러 개 추가할 수 있습니다.</p></div><div class="field"><label>이름 또는 별명</label><input class="input" name="display_name" maxlength="40" required></div><div class="field"><label>가능한 시간</label><div class="availability-list" id="slots"></div><button class="button button-ghost button-small" id="add-slot" type="button">+ 시간대 추가</button></div><div class="field"><label>출발 위치</label><div class="location-tools"><input class="input" id="location-query" placeholder="주소, 역, 장소 검색"><button class="button button-secondary button-small" id="search-location" type="button">검색</button><button class="button button-secondary button-small" id="current-location" type="button">현재 위치</button></div><div class="map-shell"><div class="map" id="response-map"></div></div><div class="selected-location" id="selected-location">지도에서 위치를 선택해 주세요.</div></div><div class="notice notice-info">집 주소 대신 가까운 역이나 동네 중심을 입력해도 됩니다.</div><button class="button button-primary" type="submit">응답 제출하기</button></form><aside class="sidebar"><section class="panel"><h3>참여 현황</h3><p class="panel-intro" id="summary"></p><div class="participant-list" id="people"></div></section><section class="panel stack"><h3>모임 링크</h3><button class="button button-secondary" id="copy-link" type="button">초대 링크 복사</button><a class="button button-primary" id="result-link" href="#">현재 결과 보기</a></section></aside></section></main><footer class="footer"><div class="container footer-inner"><div>© 2026 Lava Labs · TimeFit</div><div class="footer-links"><a href="privacy.html">개인정보처리방침</a><a href="terms.html">이용약관</a></div></div></footer><div id="toast" class="toast"></div><script>
const $=s=>document.querySelector(s),code=new URLSearchParams(location.search).get('code')||'',api='https://jnciddblcndmthmmvqrz.functions.supabase.co/timefit-public';$('#code').value=code;$('#result-link').href='result.html?code='+encodeURIComponent(code);$('#copy-link').onclick=async()=>{await navigator.clipboard.writeText(location.href);$('#toast').textContent='링크를 복사했습니다.';$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1800)};function el(t,v,c){const n=document.createElement(t);n.textContent=v;if(c)n.className=c;return n}fetch(api+'?action=event&code='+encodeURIComponent(code)).then(r=>r.json().then(d=>[r.ok,d])).then(([ok,d])=>{if(!ok||!d.event)throw 0;const e=d.event,p=d.participants||[],h=$('#event-head');h.replaceChildren(el('span','Meeting','eyebrow'),el('h1',e.title),el('p',e.description||e.organizer_name+'님이 만든 모임입니다.'));const m=el('div','', 'meta-row');m.append(el('span','주최자 '+e.organizer_name,'meta-pill'),el('span','응답 '+p.length+'명','meta-pill'));h.append(m);$('#summary').textContent=p.length?p.length+'명이 응답했습니다.':'아직 응답한 사람이 없습니다.';p.forEach(x=>$('#people').append(el('span',x.display_name,'person-chip')));$('#event-body').classList.remove('hidden')}).catch(()=>$('#event-head').textContent='모임을 찾을 수 없습니다.');
const slots=$('#slots');function add(){const r=el('div','', 'availability-row');r.innerHTML='<input class="input date-input" type="date" required><input class="input start-input" type="time" required><input class="input end-input" type="time" required><button class="icon-button" type="button">×</button>';r.querySelector('button').onclick=()=>slots.children.length>1?r.remove():alert('시간대는 한 개 이상 필요합니다.');slots.append(r)}add();$('#add-slot').onclick=add;let map,marker,selected,geo,places;if(window.kakao){map=new kakao.maps.Map($('#response-map'),{center:new kakao.maps.LatLng(37.5665,126.978),level:8});marker=new kakao.maps.Marker({map});geo=new kakao.maps.services.Geocoder();places=new kakao.maps.services.Places();kakao.maps.event.addListener(map,'click',e=>pick(e.latLng))}function show(){marker.setPosition(new kakao.maps.LatLng(selected.lat,selected.lng));$('#latitude').value=selected.lat;$('#longitude').value=selected.lng;$('#address').value=selected.address;$('#selected-location').textContent=selected.address}function pick(pos,label){selected={lat:pos.getLat(),lng:pos.getLng(),address:label||'선택한 위치'};map.setCenter(pos);if(label)return show();geo.coord2Address(selected.lng,selected.lat,(r,s)=>{if(s===kakao.maps.services.Status.OK)selected.address=r[0].road_address?.address_name||r[0].address.address_name;show()})}$('#search-location').onclick=()=>{const q=$('#location-query').value.trim();if(!q)return;places.keywordSearch(q,(r,s)=>{if(s===kakao.maps.services.Status.OK&&r.length)pick(new kakao.maps.LatLng(+r[0].y,+r[0].x),r[0].place_name)})};$('#current-location').onclick=()=>navigator.geolocation?.getCurrentPosition(x=>pick(new kakao.maps.LatLng(x.coords.latitude,x.coords.longitude),'현재 위치'));$('#response-form').onsubmit=e=>{const a=[...slots.children].map(r=>({date:r.querySelector('.date-input').value,start:r.querySelector('.start-input').value,end:r.querySelector('.end-input').value}));if(a.some(x=>!x.date||!x.start||!x.end||x.start>=x.end)||!selected){e.preventDefault();alert('시간과 출발 위치를 모두 확인해 주세요.');return}$('#availability').value=JSON.stringify(a)};
</script></body></html>
