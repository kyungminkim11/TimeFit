<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>모임 결과 | TimeFit</title>
  <link rel="stylesheet" href="css/v2.css">
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9dd3396dc9afd1f1fe1b0cc2bbc42096&libraries=services"></script>
</head>
<body>
<header class="site-header">
  <nav class="container nav">
    <a class="brand" href="index.html"><span class="brand-mark">T</span>TimeFit</a>
    <a class="button button-primary button-small keep-mobile" id="respond" href="#">내 응답 입력</a>
  </nav>
</header>
<main>
  <section class="page-hero">
    <div class="container" id="result-head"><div class="loading">추천 결과를 계산하는 중입니다.</div></div>
  </section>
  <section class="container stack hidden" id="result-body" style="padding:28px 0 70px">
    <section class="panel hidden" id="confirmed-section">
      <span class="eyebrow">Confirmed</span>
      <h2>최종 일정이 확정됐습니다.</h2>
      <div class="result-time" id="confirmed-time"></div>
      <div class="place-name" id="confirmed-place"></div>
      <p class="panel-intro" id="confirmed-address"></p>
      <div class="button-row">
        <button class="button button-primary" id="calendar-button" type="button">캘린더에 추가</button>
        <button class="button button-secondary" id="share-confirmed" type="button">확정 일정 공유</button>
      </div>
    </section>
    <section class="panel">
      <div class="section-heading"><span class="eyebrow">Best time</span><h2>가장 많이 겹치는 시간</h2><p>참여자가 입력한 시간 범위의 실제 교집합입니다.</p></div>
      <div class="result-grid" id="times"></div>
    </section>
    <section class="panel">
      <div class="section-heading"><span class="eyebrow">Balanced place</span><h2>이동 균형이 좋은 장소</h2><p>평균 거리와 가장 먼 사람의 부담을 함께 비교합니다.</p></div>
      <div class="result-grid">
        <div><div id="place-summary"></div><div class="distance-table" id="distances"></div></div>
        <div class="map-shell"><div class="map" id="result-map"></div></div>
      </div>
    </section>
    <section class="panel"><h3>참여자별 응답</h3><div class="stack" id="details" style="margin-top:14px"></div></section>
    <section class="panel">
      <h3>결과 공유</h3>
      <p class="panel-intro">새 응답이 들어오면 이 링크의 결과도 자동으로 갱신됩니다.</p>
      <div class="share-box"><input class="input" id="share-url" readonly><button class="button button-secondary" id="copy-result">링크 복사</button></div>
      <button class="button button-primary" id="share-result" type="button" style="margin-top:10px">모바일로 공유</button>
    </section>
  </section>
</main>
<footer class="footer"><div class="container footer-inner"><span>© 2026 Lava Labs · TimeFit</span><div class="footer-links"><a href="privacy.html">개인정보처리방침</a><a href="terms.html">이용약관</a></div></div></footer>
<div class="toast" id="toast" aria-live="polite"></div>
<script type="module" src="js/v3-ui.js"></script>
</body>
</html>
