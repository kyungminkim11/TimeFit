<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>모임 관리 | TimeFit</title>
  <link rel="stylesheet" href="css/v2.css">
</head>
<body>
<header class="site-header">
  <nav class="container nav">
    <a class="brand" href="index.html"><span class="brand-mark">T</span>TimeFit</a>
    <div class="nav-links"><a class="button button-primary button-small keep-mobile" href="index.html#create">새 모임</a></div>
  </nav>
</header>
<main>
  <section class="page-hero">
    <div class="container" id="head"><div class="loading">관리 정보를 불러오는 중입니다.</div></div>
  </section>
  <section class="container layout hidden" id="body">
    <form class="panel stack" id="form">
      <div><span class="eyebrow">Organizer</span><h2>모임 설정</h2><p class="panel-intro">변경 사항은 즉시 참여 화면과 결과 화면에 반영됩니다.</p></div>
      <div class="field"><label>모임 이름</label><input class="input" id="title" maxlength="80" required></div>
      <div class="field"><label>설명</label><textarea class="textarea" id="description" maxlength="500"></textarea></div>
      <div class="field"><label>후보 기간</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><input class="input" id="date_start" type="date" required><input class="input" id="date_end" type="date" required></div></div>
      <div class="field"><label>예상 소요 시간</label><select class="select" id="duration"><option value="60">1시간</option><option value="90">1시간 30분</option><option value="120">2시간</option><option value="180">3시간</option><option value="240">4시간</option></select></div>
      <div class="field"><label>최대 참여 인원</label><input class="input" id="participant_limit" type="number" min="2" max="100" required></div>
      <div class="field"><label>응답 마감</label><input class="input" id="deadline" type="datetime-local"></div>
      <div class="field"><label>응답 상태</label><select class="select" id="status"><option value="open">응답 받는 중</option><option value="closed">응답 마감</option></select></div>
      <button class="button button-primary" id="save">변경 사항 저장</button>
      <div class="notice notice-warning">관리 주소에는 주최자 권한이 포함됩니다. 참여자에게 공유하지 마세요.</div>
    </form>
    <aside class="sidebar">
      <section class="panel stack">
        <h3>공유 링크</h3>
        <button class="button button-secondary" id="copy_invite" type="button">초대 링크 복사</button>
        <button class="button button-secondary" id="copy_result" type="button">결과 링크 복사</button>
        <a class="button button-primary" id="open_result" href="#">결과 화면 열기</a>
      </section>
      <section class="panel">
        <h3>참여 현황</h3>
        <p class="panel-intro" id="summary"></p>
        <div class="participant-list" id="people"></div>
        <button class="button button-secondary button-small" id="csv" type="button" style="margin-top:14px">CSV 내보내기</button>
      </section>
      <section class="panel stack">
        <h3>위험 구역</h3>
        <p class="panel-intro">삭제한 모임과 응답은 복구할 수 없습니다.</p>
        <button class="button button-danger" id="delete_event" type="button">모임 삭제</button>
      </section>
    </aside>
  </section>
</main>
<footer class="footer"><div class="container footer-inner"><span>© 2026 Lava Labs · TimeFit</span><div class="footer-links"><a href="privacy.html">개인정보처리방침</a><a href="terms.html">이용약관</a></div></div></footer>
<div class="toast" id="toast"></div>
<script>
const API='https://jnciddblcndmthmmvqrz.functions.supabase.co/timefit-public';
const $=s=>document.querySelector(s);
const code=new URLSearchParams(location.search).get('code')||'';
const token=new URLSearchParams(location.hash.slice(1)).get('token')||'';
let current=null;
const invite=`${location.origin}/event.html?code=${encodeURIComponent(code)}`;
const result=`${location.origin}/result.html?code=${encodeURIComponent(code)}`;
const notify=m=>{const n=$('#toast');n.textContent=m;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),1800)};
const copy=async value=>{await navigator.clipboard.writeText(value);notify('링크를 복사했습니다.')};
const localDate=value=>value?new Date(new Date(value).getTime()-new Date(value).getTimezoneOffset()*60000).toISOString().slice(0,16):'';
async function load(){
  if(!code||!token){$('#head').textContent='올바른 관리 링크가 아닙니다.';return}
  try{
    const r=await fetch(`${API}?action=manage&code=${encodeURIComponent(code)}&token=${encodeURIComponent(token)}`);
    const data=await r.json();if(!r.ok||!data.event)throw new Error(data.error||'LOAD_FAILED');
    current=data;const e=data.event,p=data.participants||[];
    $('#head').innerHTML=`<span class="eyebrow">Organizer</span><h1>${e.title}</h1><p>${p.length}명의 응답을 관리하고 최신 결과를 확인하세요.</p>`;
    $('#title').value=e.title||'';$('#description').value=e.description||'';$('#date_start').value=e.date_start||'';$('#date_end').value=e.date_end||'';$('#duration').value=String(e.meeting_duration_minutes||60);$('#participant_limit').value=e.participant_limit||30;$('#deadline').value=localDate(e.deadline);$('#status').value=e.status||'open';
    $('#summary').textContent=`${p.length}명 응답 · 최대 ${e.participant_limit||30}명`;
    $('#people').innerHTML=p.length?p.map(x=>`<span class="person-chip">${x.display_name}</span>`).join(''):'<div class="empty-state">아직 응답이 없습니다.</div>';
    $('#open_result').href=result;$('#body').classList.remove('hidden');
  }catch{$('#head').textContent='관리 권한을 확인할 수 없습니다.'}
}
$('#copy_invite').onclick=()=>copy(invite);$('#copy_result').onclick=()=>copy(result);
$('#form').onsubmit=async e=>{e.preventDefault();const b=$('#save');b.disabled=true;b.textContent='저장 중…';try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'update_event',code,organizer_token:token,title:$('#title').value,description:$('#description').value,date_start:$('#date_start').value,date_end:$('#date_end').value,duration:$('#duration').value,participant_limit:$('#participant_limit').value,deadline:$('#deadline').value,status:$('#status').value,require_location:true})});const d=await r.json();if(!r.ok||!d.ok)throw 0;notify('변경 사항을 저장했습니다.');load()}catch{alert('저장하지 못했습니다. 입력 내용을 확인해 주세요.')}finally{b.disabled=false;b.textContent='변경 사항 저장'}};
$('#delete_event').onclick=async()=>{if(!confirm('모임과 모든 응답을 삭제할까요?'))return;const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete_event',code,organizer_token:token})});if(r.ok){alert('모임을 삭제했습니다.');location.href='index.html'}else alert('삭제하지 못했습니다.')};
$('#csv').onclick=()=>{if(!current)return;const rows=[['이름','가능 시간','출발 위치'],...(current.participants||[]).map(p=>[p.display_name,(p.availability||[]).map(x=>`${x.date} ${x.start}-${x.end}`).join(' / '),p.address||''])];const csv='\ufeff'+rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`timefit-${code}.csv`;a.click();URL.revokeObjectURL(a.href)};
load();
</script>
</body>
</html>
